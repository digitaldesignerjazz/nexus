# Nexus-aware Yggdrasil Configuration
# Generated by github.com/esslinger/nexus
#
# This is a standard Yggdrasil config with extra sections for Nexus features.
# After editing, run: go run ./cmd/nexus -config nexus.conf

{
  "Peers": [
    # Example public Yggdrasil bootstrap peers (replace/add your own)
    "tcp://yggdrasil.servebeer.com:44444",
    "tcp://[2a01:4f8:1c0c:80b5::1]:44444",
    # Add more from https://publicpeers.neilalexander.dev/ or your private peers
    # Nexus can later auto-manage this list via agent swarm + reputation
  ],
  "Listen": [
    "tcp://0.0.0.0:0",
    "quic://0.0.0.0:0"
  ],
  "AdminListen": "unix:///var/run/yggdrasil.sock",
  "MulticastInterfaces": [
    {
      "Regex": ".*",
      "Beacon": true,
      "Listen": true,
      "Port": 0
    }
  ],

  # === NEXUS EXTENSIONS (custom - ignored by vanilla yggdrasil) ===
  "Nexus": {
    "SwarmEndpoint": "unix:///tmp/nexus-swarm.sock",
    "AutoPeer": true,
    "ReputationEnabled": true,
    "AgentHooks": {
      "onPeerUp": "notify-agent",
      "onBandwidthSample": "update-qcoin"
    }
  }
}
