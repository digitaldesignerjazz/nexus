# Yggdrasil Configuration for Nexus Mesh
# Copy to config/yggdrasil.conf and customize.
# This template is tailored for Nexus use: trusted peering, hardware discovery,
# privacy layering potential, and integration with AI/QNET components.
#
# Official documentation: https://yggdrasil-network.github.io/configuration.html
# After changes: restart the Yggdrasil service/container.

# Listen addresses for incoming peerings (TLS recommended for security)
Listen:
  - tls://[::]:12345
  # - tcp://[::]:12345   # plain TCP alternative (less secure)

# Peering connections (outgoing)
# Add trusted Nexus nodes here for private meshes.
# Use public peers only for initial bootstrap / testing.
Peers:
  # Example public peer (replace with current active ones from https://github.com/yggdrasil-network/public-peers)
  - tcp://public-peer.example.com:12345
  # Your Nexus core nodes (use their underlay IP or domain + port)
  # - tls://core1.nexus.example:12345
  # - tls://core2.nexus.example:12345

# Allowed public keys for incoming peerings
# Strongly recommended for production Nexus meshes.
# Only nodes whose public keys are listed can peer with you.
# Generate keys with: yggdrasil -genconf | grep PublicKey
AllowedPublicKeys: []
  # - "your-node-public-key-here"
  # - "another-trusted-nexus-node-key"

# Multicast discovery on local interfaces (great for Tenda Nova / LAN hardware nodes)
MulticastInterfaces:
  - name: "*"          # or specific interface like eth0, wlan0
    port: 12345
    beacon: true
    listen: true

# Interface name for the Yggdrasil TUN device (default usually fine)
IfName: auto

# NodeInfo (optional metadata visible to peers)
NodeInfo:
  name: "Nexus Node"
  type: "core | hardware | ai-agent | prototype"
  location: "Hannover, DE / Global Nexus Mesh"
  # Add any other useful metadata

# Session firewall / rate limiting (advanced)
# SessionFirewall:
#   Enable: true
#   AllowFromDirect: true
#   AllowFromRemote: true

# Logging level (debug, info, warn, error)
LogLevel: info

# Additional advanced options (see official docs)
# AdminListen: "unix:///var/run/yggdrasil.sock"
# AllowedPublicKeys: []   # already shown above
# MulticastInterfaces: [...] # already shown

# Notes for Nexus:
# - Start with empty AllowedPublicKeys + public peers for exploration.
# - Lock down with AllowedPublicKeys + TLS for private Nexus testnets.
# - Enable MulticastInterfaces when deploying on hardware sharing LAN with other nodes.
# - Use NodeInfo to help identify nodes in your mesh visually or via AI monitoring.
# - For Tor/I2P layering: peer via .onion or I2P addresses in the Peers section.
# - After editing, the container/service must be restarted for changes to take effect.